<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Web Lọ Online 🚀</title>
<style>
:root {
  --cyan:#00d2ff; --purple:#7b2ff7; --pink:#ff2d78;
  --warn:#ffa502; --danger:#ff4757; --safe:#2ed573;
  --bg:#060a14;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  min-height:100vh;overflow:hidden;
  background:var(--bg);
  font-family:'Segoe UI',system-ui,sans-serif;
  color:#e0e0e0;
  display:flex;flex-direction:column;align-items:center;
  user-select:none;
}

/* ── CANVAS BG ── */
#bgCanvas{position:fixed;inset:0;width:100%;height:100%;z-index:0;pointer-events:none}

/* ── APP ── */
#app{position:relative;z-index:1;width:100%;display:flex;flex-direction:column;align-items:center;padding-top:22px}

/* ── TITLE ── */
h1{
  font-size:2rem;font-weight:900;letter-spacing:1.5px;
  background:linear-gradient(90deg,var(--cyan),var(--purple),var(--pink),var(--cyan));
  background-size:300%;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  animation:gradShift 3.5s linear infinite,titleFloat 4s ease-in-out infinite;
  filter:drop-shadow(0 0 22px rgba(0,210,255,.45));
}
@keyframes gradShift{to{background-position:300%}}
@keyframes titleFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-6px)}}

/* ── SUBTITLE TICKER ── */
#ticker-wrap{
  width:310px;overflow:hidden;margin:6px 0 14px;
  mask:linear-gradient(90deg,transparent,#fff 15%,#fff 85%,transparent);
}
#ticker{
  display:inline-block;white-space:nowrap;
  font-size:.72rem;letter-spacing:.7px;color:rgba(0,210,255,.55);
  animation:tickerScroll 18s linear infinite;
}
@keyframes tickerScroll{0%{transform:translateX(100%)}100%{transform:translateX(-100%)}}

/* ── GLASS CARD ── */
.glass-card{
  background:rgba(255,255,255,.042);
  backdrop-filter:blur(18px);-webkit-backdrop-filter:blur(18px);
  border:1px solid rgba(255,255,255,.09);
  border-radius:22px;padding:18px 26px 14px;width:310px;
  box-shadow:0 8px 48px rgba(0,0,0,.6),0 0 0 1px rgba(0,210,255,.06),
    inset 0 1px 0 rgba(255,255,255,.07);
}

/* ── PRESSURE ── */
.pressure-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:6px}
.pressure-top label{font-size:.68rem;color:rgba(255,255,255,.38);letter-spacing:1.8px;text-transform:uppercase}
#pressure-pct{font-size:.88rem;font-weight:900;color:var(--cyan);transition:color .4s;font-variant-numeric:tabular-nums}
#pressure-track{
  width:100%;height:12px;background:rgba(255,255,255,.06);
  border-radius:6px;overflow:hidden;margin-bottom:12px;
  box-shadow:inset 0 2px 5px rgba(0,0,0,.35);
}
#pressure-fill{
  height:100%;width:0%;border-radius:6px;
  background:linear-gradient(90deg,var(--safe),var(--warn),var(--danger));
  transition:width .35s cubic-bezier(.4,0,.2,1);
  position:relative;overflow:hidden;
}
#pressure-fill::after{
  content:"";position:absolute;top:0;left:-70%;
  width:40%;height:100%;
  background:rgba(255,255,255,.32);transform:skewX(-20deg);
  animation:pShine 2s linear infinite;
}
@keyframes pShine{to{left:130%}}

/* ── STATS ── */
.stats-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
#counter{
  font-size:2rem;font-weight:900;color:var(--cyan);
  transition:color .3s;display:inline-block;
  font-variant-numeric:tabular-nums;
}
#counter.bump{animation:bump .22s ease}
@keyframes bump{0%,100%{transform:scale(1)}50%{transform:scale(1.5)}}

/* ── RIGHT BADGES ── */
.badge-col{display:flex;flex-direction:column;gap:5px;align-items:flex-end}
#combo-badge,#streak-badge{
  font-size:.75rem;font-weight:800;padding:3px 11px;border-radius:20px;
  opacity:0;transform:scale(.6);transition:opacity .3s,transform .3s;
}
#combo-badge{background:rgba(255,165,2,.14);border:1px solid rgba(255,165,2,.4);color:var(--warn)}
#streak-badge{background:rgba(255,45,120,.14);border:1px solid rgba(255,45,120,.4);color:var(--pink)}
#combo-badge.on,#streak-badge.on{opacity:1;transform:scale(1)}

/* ── HINT ── */
#hint{font-size:.74rem;color:rgba(255,255,255,.3);margin-top:7px;text-align:center;animation:hintPulse 3s ease-in-out infinite}
@keyframes hintPulse{0%,100%{opacity:.3}50%{opacity:.8}}

/* ── MINI STATS BAR ── */
#mini-stats{
  display:flex;gap:10px;margin-top:10px;padding-top:10px;
  border-top:1px solid rgba(255,255,255,.06);
}
.stat-box{
  flex:1;background:rgba(255,255,255,.04);border-radius:10px;
  padding:6px 8px;text-align:center;
  border:1px solid rgba(255,255,255,.07);
}
.stat-box .sv{font-size:1.05rem;font-weight:800;color:var(--cyan)}
.stat-box .sk{font-size:.62rem;color:rgba(255,255,255,.3);letter-spacing:.8px;text-transform:uppercase;margin-top:1px}

/* ── BOTTLE ── */
#bottle-zone{position:relative;margin:22px auto 0;display:flex;flex-direction:column;align-items:center}

#bottle{
  width:110px;height:230px;
  background:linear-gradient(155deg,rgba(0,210,255,.16) 0%,rgba(0,140,200,.26) 55%,rgba(0,80,140,.20) 100%);
  border-radius:55px 55px 25px 25px;
  border:2px solid rgba(0,210,255,.32);
  position:relative;cursor:pointer;overflow:hidden;
  backdrop-filter:blur(10px);-webkit-backdrop-filter:blur(10px);
  box-shadow:0 0 28px rgba(0,210,255,.2),0 18px 50px rgba(0,0,0,.55),inset 0 0 30px rgba(0,210,255,.07);
  transition:border-color .4s,box-shadow .4s;
}
#bottle::before{
  content:"";position:absolute;width:46px;height:26px;
  background:linear-gradient(135deg,rgba(0,210,255,.55),rgba(0,90,180,.75));
  top:-22px;left:32px;border-radius:7px;
  border:1.5px solid rgba(0,210,255,.45);
  box-shadow:0 0 14px rgba(0,210,255,.3);
}
#bottle::after{
  content:"";position:absolute;width:16px;height:80px;
  background:rgba(255,255,255,.15);top:18px;left:12px;
  border-radius:50%;transform:rotate(-15deg);pointer-events:none;
}
#liquid{
  position:absolute;bottom:0;left:0;width:100%;height:55%;
  background:linear-gradient(180deg,rgba(0,210,255,.18),rgba(0,170,255,.38));
  border-radius:0 0 25px 25px;
  animation:liquidWave 2.8s ease-in-out infinite;
  transition:background 1.2s,height .8s;pointer-events:none;
}
@keyframes liquidWave{0%,100%{transform:scaleX(1) translateY(0)}50%{transform:scaleX(1.028) translateY(-7px)}}

/* scan line on bottle */
#scan-line{
  position:absolute;width:100%;height:3px;
  background:linear-gradient(90deg,transparent,rgba(0,210,255,.7),transparent);
  top:0;left:0;pointer-events:none;
  animation:scanDown 2.4s linear infinite;
}
@keyframes scanDown{0%{top:-3px;opacity:0}10%{opacity:1}90%{opacity:1}100%{top:100%;opacity:0}}

.inner-bubble{
  position:absolute;border-radius:50%;background:rgba(255,255,255,.4);
  pointer-events:none;animation:riseBubble linear forwards;
}
@keyframes riseBubble{0%{opacity:.6;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-240px) scale(.2)}}

.danger-glow{animation:dangerGlow .5s ease-in-out infinite!important}
@keyframes dangerGlow{
  0%,100%{box-shadow:0 0 28px rgba(255,71,87,.45),0 18px 50px rgba(0,0,0,.55)}
  50%{box-shadow:0 0 70px rgba(255,71,87,.9),0 18px 50px rgba(0,0,0,.55)}
}

/* ── ENERGY RING ── */
#energy-ring{
  position:absolute;top:50%;left:50%;
  width:150px;height:150px;margin:-75px 0 0 -75px;
  border-radius:50%;pointer-events:none;
  border:2px solid rgba(0,210,255,.18);
  box-shadow:0 0 20px rgba(0,210,255,.1);
  animation:ringPulse 2.5s ease-in-out infinite;
}
@keyframes ringPulse{0%,100%{transform:scale(1);opacity:.3}50%{transform:scale(1.09);opacity:.65}}

/* ── SHAKE ── */
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
@keyframes shakeMed{
  0%,100%{transform:translateX(0) rotate(0)}
  20%{transform:translateX(-14px) rotate(-3deg)}40%{transform:translateX(14px) rotate(3deg)}
  60%{transform:translateX(-14px) rotate(-3deg)}80%{transform:translateX(14px) rotate(3deg)}
}
@keyframes shakeHard{
  0%,100%{transform:translateX(0) rotate(0) scale(1)}
  15%{transform:translateX(-22px) rotate(-6deg) scale(1.06)}
  30%{transform:translateX(22px) rotate(6deg) scale(.94)}
  45%{transform:translateX(-22px) rotate(-6deg) scale(1.06)}
  60%{transform:translateX(22px) rotate(6deg) scale(.94)}
  80%{transform:translateX(-12px) rotate(-3deg)}
}
.shake     {animation:shake     .3s}
.shake-med {animation:shakeMed  .36s}
.shake-hard{animation:shakeHard .44s}

/* ── RIPPLE ── */
.ripple{
  position:fixed;border-radius:50%;pointer-events:none;z-index:900;
  transform:scale(0);animation:rippleOut .7s ease-out forwards;
}
@keyframes rippleOut{to{transform:scale(5);opacity:0}}

/* ── CLICK TEXT ── */
.click-text{
  position:fixed;font-size:1.1rem;font-weight:900;
  pointer-events:none;z-index:1100;
  animation:floatUp .9s ease-out forwards;
  text-shadow:0 0 14px currentColor;
}
@keyframes floatUp{0%{transform:translateY(0) scale(.6);opacity:0}18%{transform:translateY(-14px) scale(1.2);opacity:1}100%{transform:translateY(-90px) scale(.7);opacity:0}}

/* ── CURSOR TRAIL DOT ── */
.trail-dot{
  position:fixed;border-radius:50%;pointer-events:none;z-index:800;
  background:rgba(0,210,255,.7);
  animation:trailFade .5s ease-out forwards;
}
@keyframes trailFade{to{transform:scale(0);opacity:0}}

/* ── TOAST ── */
.toast{
  position:fixed;top:18px;right:-360px;
  padding:11px 22px;border-radius:14px;font-size:.88rem;font-weight:700;color:#fff;
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);
  border:1px solid rgba(255,255,255,.16);
  box-shadow:0 8px 32px rgba(0,0,0,.5);
  transition:right .45s cubic-bezier(.4,0,.2,1);z-index:2000;white-space:nowrap;
}
.toast.show{right:18px}

/* ── SPRAY ── */
#spray{
  position:absolute;width:20px;height:0;
  background:linear-gradient(to top,rgba(0,210,255,.85),rgba(255,255,255,.95));
  left:50%;transform:translateX(-50%);top:-200px;border-radius:50%;opacity:0;
  box-shadow:0 0 30px rgba(0,210,255,.8);transition:height .3s,opacity .3s;
}

/* ── SHOCKWAVE ── */
.shockwave{
  position:fixed;border-radius:50%;pointer-events:none;z-index:4999;
  transform:scale(0);animation:shockOut .9s ease-out forwards;
}
@keyframes shockOut{to{transform:scale(10);opacity:0}}

/* ── WHITEOUT ── */
.whiteout{
  position:fixed;inset:0;
  background:radial-gradient(circle at center,#fff 0%,#9fecff 100%);
  opacity:0;z-index:9999;animation:flash 1s forwards;
}
@keyframes flash{0%{opacity:0}30%{opacity:1}100%{opacity:1}}

/* ── ACHIEVEMENT POPUP ── */
.achieve{
  position:fixed;bottom:-120px;left:50%;transform:translateX(-50%);
  background:rgba(15,20,40,.92);
  border:1px solid rgba(0,210,255,.35);
  border-radius:16px;padding:12px 26px;
  display:flex;align-items:center;gap:12px;
  box-shadow:0 0 30px rgba(0,210,255,.25);
  transition:bottom .5s cubic-bezier(.4,0,.2,1);z-index:2500;
  min-width:240px;
}
.achieve.show{bottom:24px}
.achieve .ach-icon{font-size:2rem}
.achieve .ach-text .ach-title{font-size:.72rem;color:var(--cyan);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:2px}
.achieve .ach-text .ach-name{font-size:.95rem;font-weight:800;color:#fff}
</style>
</head>
<body>
<canvas id="bgCanvas"></canvas>

<div id="app">
  <h1>🧪 Web Lọ Online 🚀</h1>

  <div id="ticker-wrap">
    <span id="ticker">⚗️ Phiên bản SIÊU CẤP VIP PRO MAX &nbsp;•&nbsp; 🔥 Thử thách: lắc 10 lần để nổ &nbsp;•&nbsp; ⚡ Combo click để tăng điểm &nbsp;•&nbsp; 🏆 Mở khóa thành tựu &nbsp;•&nbsp; ☠️ Cẩn thận kẻo vỡ &nbsp;•&nbsp;</span>
  </div>

  <div class="glass-card">
    <div class="pressure-top">
      <label id="p-label">⚡ ÁP SUẤT TRONG CHAI</label>
      <span id="pressure-pct">0%</span>
    </div>
    <div id="pressure-track"><div id="pressure-fill"></div></div>

    <div class="stats-row">
      <span id="counter">0 <span style="font-size:.85rem;opacity:.35;font-weight:400">/ 10</span></span>
      <div class="badge-col">
        <span id="combo-badge">🔥 COMBO ×2</span>
        <span id="streak-badge">⚡ FAST!</span>
      </div>
    </div>

    <p id="hint">👆 Click vào chai để lắc!</p>

    <div id="mini-stats">
      <div class="stat-box"><div class="sv" id="stat-max-combo">0</div><div class="sk">Max Combo</div></div>
      <div class="stat-box"><div class="sv" id="stat-speed">0</div><div class="sk">Click/giây</div></div>
      <div class="stat-box"><div class="sv" id="stat-score">0</div><div class="sk">Điểm</div></div>
    </div>
  </div>

  <div id="bottle-zone">
    <div id="energy-ring"></div>
    <div id="bottle">
      <div id="liquid"></div>
      <div id="scan-line"></div>
    </div>
  </div>
</div>

<script>
/* ══ CANVAS BACKGROUND ══ */
const canvas=document.getElementById("bgCanvas"), bx=canvas.getContext("2d");
function resizeCv(){canvas.width=innerWidth;canvas.height=innerHeight}
resizeCv();addEventListener("resize",resizeCv);

const STAR_N=160;
const stars=Array.from({length:STAR_N},()=>({
  x:Math.random()*innerWidth,y:Math.random()*innerHeight,
  r:Math.random()*1.7+.3,speed:Math.random()*.3+.06,
  dir:Math.random()*Math.PI*2,op:Math.random(),dop:(Math.random()-.5)*.02,
  hue:Math.random()<.7?190:270,
}));
// connection lines between close stars
function drawBg(){
  bx.clearRect(0,0,canvas.width,canvas.height);
  // grid
  bx.strokeStyle="rgba(0,210,255,0.025)";bx.lineWidth=1;
  const g=65;
  for(let x=0;x<canvas.width;x+=g){bx.beginPath();bx.moveTo(x,0);bx.lineTo(x,canvas.height);bx.stroke()}
  for(let y=0;y<canvas.height;y+=g){bx.beginPath();bx.moveTo(0,y);bx.lineTo(canvas.width,y);bx.stroke()}
  // connections
  for(let i=0;i<stars.length;i++){
    for(let j=i+1;j<stars.length;j++){
      const dx=stars[i].x-stars[j].x,dy=stars[i].y-stars[j].y;
      const d=Math.sqrt(dx*dx+dy*dy);
      if(d<95){
        bx.strokeStyle=`rgba(0,210,255,${(.055*(1-d/95))})`;
        bx.lineWidth=.6;
        bx.beginPath();bx.moveTo(stars[i].x,stars[i].y);bx.lineTo(stars[j].x,stars[j].y);bx.stroke();
      }
    }
  }
  stars.forEach(s=>{
    s.op+=s.dop;if(s.op<.05||s.op>.95)s.dop*=-1;
    s.x+=Math.cos(s.dir)*s.speed;s.y+=Math.sin(s.dir)*s.speed;
    if(s.x<0)s.x=canvas.width;if(s.x>canvas.width)s.x=0;
    if(s.y<0)s.y=canvas.height;if(s.y>canvas.height)s.y=0;
    bx.beginPath();bx.arc(s.x,s.y,s.r,0,Math.PI*2);
    bx.fillStyle=`hsla(${s.hue},100%,75%,${s.op})`;bx.fill();
  });
  requestAnimationFrame(drawBg);
}
drawBg();

/* ══ CURSOR TRAIL ══ */
document.addEventListener("mousemove",e=>{
  const d=document.createElement("div");d.className="trail-dot";
  const s=Math.random()*5+2;
  d.style.cssText=`width:${s}px;height:${s}px;left:${e.clientX-s/2}px;top:${e.clientY-s/2}px;
    opacity:${Math.random()*.5+.2};background:hsl(${185+Math.random()*60},100%,70%);`;
  document.body.appendChild(d);setTimeout(()=>d.remove(),520);
});

/* ══ AUDIO ══ */
let ac=null;
function getAC(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();return ac}
function playClick(n){
  try{
    const a=getAC(),o=a.createOscillator(),g=a.createGain(),flt=a.createBiquadFilter();
    flt.type="bandpass";flt.frequency.value=800+n*60;
    o.connect(flt);flt.connect(g);g.connect(a.destination);
    o.type="sine";
    o.frequency.setValueAtTime(280+n*52,a.currentTime);
    o.frequency.exponentialRampToValueAtTime(160+n*30,a.currentTime+.13);
    g.gain.setValueAtTime(.3,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.18);
    o.start(a.currentTime);o.stop(a.currentTime+.18);
  }catch(e){}
}
function playWarn(){
  try{
    const a=getAC();
    [0,.16,.34].forEach(d=>{
      const o=a.createOscillator(),g=a.createGain();
      o.connect(g);g.connect(a.destination);o.type="sawtooth";o.frequency.value=880;
      g.gain.setValueAtTime(.12,a.currentTime+d);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d+.12);
      o.start(a.currentTime+d);o.stop(a.currentTime+d+.12);
    });
  }catch(e){}
}
function playBoom(){
  try{
    const a=getAC();
    const len=(a.sampleRate*.9)|0,buf=a.createBuffer(1,len,a.sampleRate),d=buf.getChannelData(0);
    for(let i=0;i<len;i++)d[i]=(Math.random()*2-1)*Math.pow(1-i/len,1.8);
    const src=a.createBufferSource();src.buffer=buf;
    const gn=a.createGain();gn.gain.setValueAtTime(.98,a.currentTime);gn.gain.exponentialRampToValueAtTime(.001,a.currentTime+.9);
    src.connect(gn);gn.connect(a.destination);src.start();
    const oo=a.createOscillator(),gb=a.createGain();
    oo.connect(gb);gb.connect(a.destination);oo.type="sine";
    oo.frequency.setValueAtTime(220,a.currentTime);oo.frequency.exponentialRampToValueAtTime(16,a.currentTime+.75);
    gb.gain.setValueAtTime(.95,a.currentTime);gb.gain.exponentialRampToValueAtTime(.001,a.currentTime+.75);
    oo.start(a.currentTime);oo.stop(a.currentTime+.75);
  }catch(e){}
}
function playCombo(n){
  try{
    const a=getAC(),o=a.createOscillator(),g=a.createGain();
    o.connect(g);g.connect(a.destination);o.type="triangle";
    o.frequency.setValueAtTime(440+n*80,a.currentTime);
    g.gain.setValueAtTime(.22,a.currentTime);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+.2);
    o.start(a.currentTime);o.stop(a.currentTime+.2);
  }catch(e){}
}
function playAchieve(){
  try{
    const a=getAC();
    [0,.12,.24].forEach((d,i)=>{
      const o=a.createOscillator(),g=a.createGain();
      o.connect(g);g.connect(a.destination);o.type="sine";
      const freqs=[523,659,784];
      o.frequency.value=freqs[i];
      g.gain.setValueAtTime(.2,a.currentTime+d);g.gain.exponentialRampToValueAtTime(.001,a.currentTime+d+.28);
      o.start(a.currentTime+d);o.stop(a.currentTime+d+.28);
    });
  }catch(e){}
}

/* ══ STATE ══ */
let count=0,lastClick=0,combo=0,maxCombo=0,comboTimer=null;
let score=0,clickTimes=[],exploded=false;
const bottle=document.getElementById("bottle"),liquid=document.getElementById("liquid");
const pFill=document.getElementById("pressure-fill"),pPct=document.getElementById("pressure-pct");
const pLabel=document.getElementById("p-label"),ctrEl=document.getElementById("counter");
const hintEl=document.getElementById("hint"),comboBdg=document.getElementById("combo-badge");
const streakBdg=document.getElementById("streak-badge");
const statMaxCombo=document.getElementById("stat-max-combo");
const statSpeed=document.getElementById("stat-speed");
const statScore=document.getElementById("stat-score");
const energyRing=document.getElementById("energy-ring");

/* ── inner bubbles ── */
function spawnBubble(){
  const b=document.createElement("div");b.className="inner-bubble";
  const s=Math.random()*7+2,dur=Math.random()*2+1;
  b.style.cssText=`width:${s}px;height:${s}px;left:${Math.random()*78+11}%;bottom:${Math.random()*40+4}%;animation-duration:${dur}s;`;
  bottle.appendChild(b);setTimeout(()=>b.remove(),dur*1000+100);
}
setInterval(spawnBubble,580);

/* ── ripple ── */
function ripple(e){
  const r=document.createElement("div"),sz=60;r.className="ripple";
  r.style.cssText=`width:${sz}px;height:${sz}px;left:${e.clientX-30}px;top:${e.clientY-30}px;
    background:${count>=7?"rgba(255,71,87,.3)":"rgba(0,210,255,.28)"};`;
  document.body.appendChild(r);setTimeout(()=>r.remove(),720);
}

/* ── click text ── */
const ctData=[
  ["💧+1","#00d2ff"],["💧+1","#00d2ff"],["💧+1","#00d2ff"],["💧+1","#00d2ff"],
  ["⚡+1","#ffa502"],["⚡+1","#ffa502"],["⚡+1","#ffa502"],
  ["🔥+1","#ff6b6b"],["🔥+1","#ff4757"],["💥+1","#ff0000"],
];
function clickText(e){
  const [lbl,col]=ctData[Math.min(count-1,9)];
  let label=lbl;
  if(combo>=3) label=`${lbl} ×${combo}`;
  const t=document.createElement("div");t.className="click-text";
  t.textContent=label;
  t.style.cssText=`left:${e.clientX-28}px;top:${e.clientY-24}px;color:${col};`;
  document.body.appendChild(t);setTimeout(()=>t.remove(),950);
}

/* ── particles ── */
function particles(e,n){
  const pal=n>=7?["#ff4757","#ff6b81","#ffa502","#ff7f50","#fff","#f1c40f"]:["#00d2ff","#7b2ff7","#2ed573","#00b0d8","#fff","#a29bfe"];
  const count2=Math.min(8+n*1.5,22)|0;
  for(let i=0;i<count2;i++){
    const p=document.createElement("div"),s=Math.random()*10+4;
    p.style.cssText=`position:fixed;border-radius:50%;pointer-events:none;z-index:1000;
      left:${e.clientX}px;top:${e.clientY}px;width:${s}px;height:${s}px;
      background:${pal[i%pal.length]};box-shadow:0 0 7px ${pal[i%pal.length]};`;
    document.body.appendChild(p);
    const angle=(Math.PI*2/count2)*i+(Math.random()-.5)*.8;
    const dist=Math.random()*95+25;
    const tx=Math.cos(angle)*dist,ty=Math.sin(angle)*dist,dur=Math.random()*320+360;
    let s0=null;
    (function anim(ts){if(!s0)s0=ts;const prog=(ts-s0)/dur;
      if(prog<1){p.style.transform=`translate(${tx*prog}px,${ty*prog+85*prog*prog}px)scale(${1-prog*.78})`;
        p.style.opacity=1-prog;requestAnimationFrame(anim);}else p.remove();})(performance.now());
  }
}

/* ── toast ── */
const toastsMap={
  1:["🚀 Bắt đầu rồi đây!","rgba(46,213,115,.75)"],
  5:["⚡ Nửa đường rồi!","rgba(255,165,2,.78)"],
  7:["🔥 Nguy hiểm đây!","rgba(255,100,50,.82)"],
  9:["🚨 SẮP NỔ! RUN AWAY!!!","rgba(220,38,38,.88)"],
};
function toast(msg,bg){
  const t=document.createElement("div");t.className="toast";t.textContent=msg;t.style.background=bg;
  document.body.appendChild(t);
  setTimeout(()=>t.classList.add("show"),10);
  setTimeout(()=>{t.classList.remove("show");setTimeout(()=>t.remove(),500)},3000);
}

/* ── achievement ── */
const achievements={
  first:{icon:"🎉",name:"Lần đầu lắc chai",done:false},
  combo3:{icon:"🔥",name:"Combo ×3 siêu tốc",done:false},
  combo5:{icon:"⚡",name:"Combo ×5 LEGENDARY",done:false},
  halfway:{icon:"💪",name:"Vượt qua nửa đường",done:false},
  almostboom:{icon:"😱",name:"Sống sót tới 9 lần",done:false},
};
function triggerAchieve(key){
  if(achievements[key].done)return;
  achievements[key].done=true;playAchieve();
  const a=document.createElement("div");a.className="achieve";
  a.innerHTML=`<div class="ach-icon">${achievements[key].icon}</div>
    <div class="ach-text"><div class="ach-title">🏆 Thành tựu mở khóa!</div>
    <div class="ach-name">${achievements[key].name}</div></div>`;
  document.body.appendChild(a);
  setTimeout(()=>a.classList.add("show"),20);
  setTimeout(()=>{a.classList.remove("show");setTimeout(()=>a.remove(),550)},3200);
}

/* ── liquid color ── */
const liquidGrads=[
  "linear-gradient(180deg,rgba(0,210,255,.18),rgba(0,170,255,.38))",
  "linear-gradient(180deg,rgba(255,200,50,.22),rgba(255,130,0,.42))",
  "linear-gradient(180deg,rgba(255,80,80,.28),rgba(200,0,0,.48))",
];
function updateLiquid(){
  const idx=count<4?0:count<7?1:2;
  liquid.style.background=liquidGrads[idx];
  liquid.style.height=(55+count*3.2)+"%";
}

/* ── click speed ── */
function calcSpeed(){
  const now=Date.now();
  clickTimes=clickTimes.filter(t=>now-t<1000);
  return clickTimes.length;
}

/* ── energy ring color ── */
function updateRing(){
  const pct=count/10;
  const r=Math.round(pct*255),g=Math.round((1-pct)*210);
  energyRing.style.borderColor=`rgba(${r},${g},255,.35)`;
  energyRing.style.boxShadow=`0 0 ${20+pct*40}px rgba(${r},${g},255,${.1+pct*.3})`;
}

/* ══ MAIN CLICK ══ */
bottle.addEventListener("click",function(e){
  if(exploded)return;
  count++;
  playClick(count);
  clickTimes.push(Date.now());

  // combo
  const now=Date.now();
  combo=now-lastClick<650?combo+1:1;
  lastClick=now;
  clearTimeout(comboTimer);
  if(combo>maxCombo){maxCombo=combo;statMaxCombo.textContent=maxCombo;}
  if(combo>=2){
    comboBdg.textContent=`🔥 COMBO ×${combo}`;
    comboBdg.classList.add("on");
    if(combo===3)triggerAchieve("combo3");
    if(combo>=5)triggerAchieve("combo5");
    playCombo(combo);
    comboTimer=setTimeout(()=>{comboBdg.classList.remove("on");combo=0;},1000);
  } else comboBdg.classList.remove("on");

  // speed
  const spd=calcSpeed();
  statSpeed.textContent=spd;
  if(spd>=5){streakBdg.textContent="⚡ FAST!";streakBdg.classList.add("on");}
  else if(spd>=3){streakBdg.textContent="💨 Quick";streakBdg.classList.add("on");}
  else streakBdg.classList.remove("on");

  // score
  const bonus=(combo>=3?(combo>=5?3:2):1)*(spd>=5?2:1);
  score+=10*bonus;
  statScore.textContent=score;

  // counter
  ctrEl.innerHTML=`${count} <span style="font-size:.85rem;opacity:.35;font-weight:400">/ 10</span>`;
  ctrEl.classList.remove("bump");void ctrEl.offsetWidth;ctrEl.classList.add("bump");

  // pressure
  pFill.style.width=(count/10*100)+"%";
  pPct.textContent=(count*10)+"%";

  // liquid + ring
  updateLiquid();updateRing();

  // toasts
  if(toastsMap[count])toast(...toastsMap[count]);

  // achievements
  if(count===1)triggerAchieve("first");
  if(count===5)triggerAchieve("halfway");
  if(count===9)triggerAchieve("almostboom");

  // stress
  bottle.classList.remove("danger-glow");
  if(count>=7){
    bottle.style.borderColor="rgba(255,71,87,.8)";
    bottle.classList.add("danger-glow");
    pPct.style.color="var(--danger)";ctrEl.style.color="var(--danger)";
    hintEl.textContent="⚠️ CẢNH BÁO — CHAI SẮP NỔ!!!";
    pLabel.textContent="🔥 ÁP SUẤT TRONG CHAI";
    if(count===7||count===9)playWarn();
  } else if(count>=4){
    bottle.style.borderColor="rgba(255,165,2,.65)";
    pPct.style.color="var(--warn)";ctrEl.style.color="var(--warn)";
    hintEl.textContent="😬 Áp suất đang tăng dần...";
    pLabel.textContent="⚡ ÁP SUẤT TRONG CHAI";
  }

  // fx
  ripple(e);clickText(e);particles(e,count);
  for(let i=0;i<Math.min(count*2,22);i++)setTimeout(spawnBubble,i*28);

  // shake
  bottle.classList.remove("shake","shake-med","shake-hard");void bottle.offsetWidth;
  const cls=count<4?"shake":count<7?"shake-med":"shake-hard";
  bottle.classList.add(cls);setTimeout(()=>bottle.classList.remove(cls),460);

  if(count>=10){exploded=true;setTimeout(explode,130);}
});

/* ══ EXPLODE ══ */
function explode(){
  playBoom();
  const spray=document.createElement("div");
  spray.id="spray";bottle.appendChild(spray);
  spray.style.opacity="1";spray.style.height="430px";

  const rect=bottle.getBoundingClientRect();
  const cx=rect.left+rect.width/2,cy=rect.top+rect.height/2;

  // shockwaves
  [0,130,270].forEach(delay=>{
    setTimeout(()=>{
      const sw=document.createElement("div");sw.className="shockwave";
      sw.style.cssText=`width:80px;height:80px;left:${cx-40}px;top:${cy-40}px;
        border:3px solid rgba(0,210,255,.9);`;
      document.body.appendChild(sw);setTimeout(()=>sw.remove(),950);
    },delay);
  });

  // 100 particles
  const pal=["#00d2ff","#7b2ff7","#ff4757","#ffa502","#2ed573","#fff",
             "#f1c40f","#fd79a8","#00cec9","#e17055","#a29bfe","#ff6b81"];
  for(let i=0;i<100;i++){
    const p=document.createElement("div"),sz=Math.random()*24+5;
    const sq=Math.random()>.55;
    p.style.cssText=`position:fixed;pointer-events:none;z-index:5000;
      width:${sz}px;height:${sz}px;left:${cx-sz/2}px;top:${cy-sz/2}px;
      background:${pal[i%pal.length]};border-radius:${sq?"5px":"50%"};
      box-shadow:0 0 10px ${pal[i%pal.length]};`;
    document.body.appendChild(p);
    const angle=Math.random()*Math.PI*2,dist=Math.random()*400+80;
    const tx=Math.cos(angle)*dist,ty=Math.sin(angle)*dist,dur=Math.random()*800+520;
    let s=null;
    (function anim(ts){if(!s)s=ts;const prog=(ts-s)/dur;
      if(prog<1){const ease=1-Math.pow(1-prog,2);
        p.style.transform=`translate(${tx*ease}px,${ty*ease+230*prog*prog}px)scale(${1-prog*.85})rotate(${prog*600}deg)`;
        p.style.opacity=1-prog;requestAnimationFrame(anim);}else p.remove();})(performance.now());
  }

  // screen shake
  let sh=0;const si=setInterval(()=>{
    const dx=(Math.random()-.5)*26,dy=(Math.random()-.5)*18;
    document.body.style.transform=`translate(${dx}px,${dy}px)`;
    if(++sh>16){clearInterval(si);document.body.style.transform="";}
  },30);

  // GAME OVER overlay with score
  setTimeout(()=>{
    const w=document.createElement("div");w.className="whiteout";document.body.appendChild(w);
    setTimeout(()=>{
      const ov=document.createElement("div");
      ov.style.cssText=`position:fixed;inset:0;display:flex;flex-direction:column;
        align-items:center;justify-content:center;z-index:10000;
        background:radial-gradient(circle at center,rgba(0,20,40,.97),rgba(0,5,15,.99));
        font-family:'Segoe UI',sans-serif;`;
      ov.innerHTML=`
        <div style="font-size:5rem;animation:titleFloat 2s infinite">💥</div>
        <div style="font-size:2.5rem;font-weight:900;margin:12px 0 4px;
          background:linear-gradient(90deg,#00d2ff,#ff4757,#ffa502);
          -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;">
          KẾT QUẢ</div>
        <div style="color:rgba(255,255,255,.45);font-size:.8rem;letter-spacing:2px;margin-bottom:22px">GAME OVER</div>
        <div style="display:flex;gap:18px;margin-bottom:28px">
          ${[["🏆 Điểm",""+score],["🔥 Max Combo","×"+maxCombo],["⚡ Max Speed",statSpeed.textContent+" c/s"]]
            .map(([k,v])=>`<div style="background:rgba(255,255,255,.06);border:1px solid rgba(0,210,255,.2);
              border-radius:14px;padding:14px 22px;text-align:center;">
              <div style="font-size:1.5rem;font-weight:900;color:#00d2ff">${v}</div>
              <div style="font-size:.68rem;color:rgba(255,255,255,.3);letter-spacing:1.2px;text-transform:uppercase;margin-top:3px">${k}</div>
            </div>`).join("")}
        </div>
        <button onclick="location.reload()" style="
          padding:13px 44px;border:none;border-radius:30px;cursor:pointer;font-size:1rem;font-weight:800;
          background:linear-gradient(135deg,#00d2ff,#7b2ff7);color:#fff;letter-spacing:.8px;
          box-shadow:0 0 30px rgba(0,210,255,.45);transition:transform .2s,box-shadow .2s;">
          🔄 CHƠI LẠI
        </button>`;
      document.body.appendChild(ov);
      ov.querySelector("button").addEventListener("mouseenter",e=>{e.target.style.transform="scale(1.07)";e.target.style.boxShadow="0 0 50px rgba(0,210,255,.65)"});
      ov.querySelector("button").addEventListener("mouseleave",e=>{e.target.style.transform="";e.target.style.boxShadow="0 0 30px rgba(0,210,255,.45)"});
    },700);
  },500);
}
</script>
</body>
</html>
